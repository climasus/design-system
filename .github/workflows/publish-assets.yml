name: Publish Design System Assets

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Publish assets to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare publish directory
        run: |
          mkdir -p _publish
          cp -r assets _publish/assets
          cp -r data   _publish/data
          # index vazio para evitar listagem de diretório
          echo "" > _publish/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_publish
          publish_branch: gh-pages
          force_orphan: true
